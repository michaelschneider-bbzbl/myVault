server.port: 9090

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/myVault
        application:
    name: myVault

  jpa:
    show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:postgresql://localhost:5432/myVault
    username: postgres
    password: 123456
    driverClassName: org.postgresql.Driver
